## Authored by Claude (Anthropic).
## Dependabot configuration. Drives automated PRs that bump GitHub
## Actions SHA pins in .github/workflows/*.yml.
##
## Note: dependabot's 'docker' ecosystem only watches Dockerfiles,
## which this repo does not have. Container image references in
## workflow 'container:' directives (debian:stable etc. in lint.yml's
## matrix) are NOT covered by dependabot at all and need to be
## bumped manually or by a different tool.
##
## See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    ## Bundle all GitHub Actions SHA bumps into a single PR per
    ## weekly cycle. Without this, dependabot opens one PR per action
    ## per cycle and the 'open-pull-requests-limit: 1' silently drops
    ## the rest. With grouping, a single PR carries every action
    ## update at once, no drops.
    groups:
      github-actions:
        patterns:
          - "*"
