## Authored by Claude (Anthropic).
## Dependabot configuration. Drives automated PRs that bump:
## 1. GitHub Actions SHA pins in .github/workflows/*.yml.
## 2. Docker base image digests in workflow 'container:' directives
##    (debian:stable etc. in lint.yml's matrix).
##
## See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
      include: scope

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
      include: scope
