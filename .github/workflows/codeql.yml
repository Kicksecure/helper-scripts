## AI-Assisted

## CodeQL static analysis (consumer wrapper).
##
## Body of the job lives in the org-wide reusable workflow:
##   org-ai-assisted/developer-meta-files/.github/workflows/codeql.yml
##
## Scope:
##   usr/lib/python3/dist-packages/{config_builder,guimessages,
##                                   query_sock_pid,sanitize_string,
##                                   stdisplay,strict_config_parser,
##                                   strip_markup,term_colors,
##                                   unicode_show}/
##
## Bash is NOT scanned: CodeQL has no bash extractor. Bash is covered
## by shellcheck (in lint.yml).
##
## Findings are uploaded to GitHub's code scanning UI under the repo's
## Security tab and surface as PR annotations.

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    ## Cron slot owned by this repo - see slot allocation in the
    ## reusable workflow's header comment.
    - cron: '17 4 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/codeql.yml@master
    with:
      language: python
    permissions:
      security-events: write
      contents: read
      packages: read
