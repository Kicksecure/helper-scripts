## Authored by Claude (Anthropic).
## ClusterFuzzLite - PR-time fuzzing (short budget). Same-repo PRs
## only ('if:' guard); forks lack the build environment.
## https://google.github.io/clusterfuzzlite/running-clusterfuzzlite/github-actions/

name: ClusterFuzzLite PR

on:
  ## Manual-only until the ClusterFuzzLite build setup is verified
  ## green at least once. Once that lands, re-enable the
  ## 'pull_request' block below to gate every PR.
  workflow_dispatch:
  ## pull_request:
  ##   branches: [master]
  ##   paths:
  ##     - 'usr/lib/python3/dist-packages/**/*.py'
  ##     - 'fuzz/**'
  ##     - '.clusterfuzzlite/**'
  ##     - '.github/workflows/cflite-pr.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr:
    name: ClusterFuzzLite PR fuzz
    runs-on: ubuntu-latest

    if: github.event.pull_request.head.repo.full_name == github.repository

    timeout-minutes: 30

    permissions:
      ## Required to upload findings as PR annotations.
      security-events: write

    steps:
      - name: Checkout repository
        ## https://github.com/actions/checkout/releases/tag/v6.0.2
        ## > de0fac2e4500dabe0009e67214ff5f5447ce83dd
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build fuzzers
        ## https://github.com/google/clusterfuzzlite/tree/v1
        ## > 884713a6c30a92e5e8544c39945cd7cb630abcd1 (HEAD of v1; no release tag)
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          language: python
          sanitizer: address

      - name: Run fuzzers
        ## https://github.com/google/clusterfuzzlite/tree/v1
        ## > 884713a6c30a92e5e8544c39945cd7cb630abcd1
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1  # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ## Per-fuzzer time budget. Total ~ N_fuzzers x this.
          fuzz-seconds: 60
          mode: 'code-change'
          sanitizer: address
          output-sarif: true
