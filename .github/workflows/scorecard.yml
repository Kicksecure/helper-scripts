## Thin wrapper around the reusable Scorecard workflow.
## See https://github.com/Kicksecure/developer-meta-files/blob/master/.github/workflows/scorecard.yml
## for trust footprint, caller responsibilities, cron-slot allocation,
## and the full design rationale.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '30 4 * * 0'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-scorecard.yml@master
    permissions:
      security-events: write
      contents: read
      actions: read
