## OpenSSF Scorecard - weekly posture audit. Trust footprint: OpenSSF
## (Linux Foundation), same scope as github/codeql-action.
##
## Job body lives in the reusable workflow at
## developer-meta-files/.github/workflows/scorecard.yml so all repos
## in the org share one definition. This file is the per-repo wrapper:
## it owns the trigger schedule (must be at the caller, GitHub Actions
## does not allow schedule under workflow_call) and the cron slot
## (offset from derivative-maker's 04:00 to avoid contention).

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    ## Sunday 04:30 UTC - offset from derivative-maker scorecard
    ## (04:00) so the two repos don't contend for the same cron slot.
    - cron: '30 4 * * 0'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    ## NOTE: GitHub Actions does NOT allow the 'github' context in
    ## jobs.<id>.uses (only inputs/vars/needs/matrix are permitted),
    ## so the owner is hardcoded. Override per-org via 'vars.X' if a
    ## fork wants to point at its own developer-meta-files mirror.
    uses: Kicksecure/developer-meta-files/.github/workflows/scorecard.yml@master
    permissions:
      security-events: write
      contents: read
      actions: read
