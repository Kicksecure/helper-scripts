## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/reusable-coverity.yml

name: Coverity

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

## Coverity singleton policy: see agents/github-actions.md G-A-006.
## Cancelling mid-flight wastes the daily free-tier slot.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  coverity:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
    with:
      ## scan.coverity.com project name. Verified at
      ## https://scan.coverity.com/projects/Kicksecure-helper-scripts (URL renders / as -; API still wants the slash)
      project-name: Kicksecure/helper-scripts
      canonical-repos: "Kicksecure/helper-scripts,org-ai-assisted/helper-scripts"
    secrets:
      COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
    permissions:
      contents: read
