## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/coverity.yml

name: Coverity

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  coverity:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
    with:
      ## scan.coverity.com project name. Verified at
      ## https://scan.coverity.com/projects/Kicksecure-helper-scripts
      project-name: Kicksecure-helper-scripts
      canonical-repos: "Kicksecure/helper-scripts,org-ai-assisted/helper-scripts"
    secrets: inherit
    permissions:
      contents: read
