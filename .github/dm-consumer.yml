## AI-Assisted

## Per-repo parameter overrides. Read at workflow runtime by the
## reusable workflows in developer-meta-files. Top-level keys
## mirror the consumer-template basename without the
## 'consumer-' prefix.
##
## Spec:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/agents/github-actions-consumer-templates.md

coverity:
  ## scan.coverity.com project name. The URL renders the slash as
  ## a dash for display ('/projects/Kicksecure-helper-scripts')
  ## but the API form-parameter requires the actual slash.
  project-name:    "org-ai-assisted-helper-scripts"
  canonical-repos: "org-ai-assisted/helper-scripts"

dist-ai-tests:
  apt-packages: "python3 python3-pytest python3-hypothesis python3-pyqt5"
